<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙龙 & 陈哲远 专属小窝💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffeaf6, #fde2f3, #f8e4ff);
            min-height: 100vh;
            font-family: "幼圆", "Comic Sans MS", "微软雅黑", sans-serif;
            overflow-x: hidden;
        }

        .top-title {
            text-align: center;
            padding: 35px 10px;
            font-size: 46px;
            font-weight: bold;
            color: #ff5ea8;
            text-shadow: 0 0 10px #ffc8e0;
            animation: swing 2.5s ease-in-out infinite alternate;
        }

        @keyframes swing {
            0% { transform: rotate(-2deg) scale(1); }
            100% { transform: rotate(2deg) scale(1.03); }
        }

        .heart {
            color: #ff2e7e;
            animation: beat 1.2s infinite alternate;
        }

        @keyframes beat {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        .card {
            width: 92%;
            max-width: 620px;
            margin: 30px auto;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 35px;
            padding: 28px;
            box-shadow: 0 6px 18px #ffd2e6;
            border: 3px solid #ffd6ec;
            animation: cardUp 5s ease-in-out infinite;
        }

        @keyframes cardUp {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .card h2 {
            text-align: center;
            margin-bottom: 18px;
            color: #d85b93;
            font-size: 26px;
            letter-spacing: 2px;
        }

        .count-time {
            font-size: 32px;
            text-align: center;
            font-weight: bold;
            color: #b7487a;
            letter-spacing: 4px;
        }

        .star-text {
            line-height: 2.2;
            font-size: 18px;
            text-align: center;
            color: #c76896;
        }

        .float-item {
            position: fixed;
            z-index: -1;
            color: #ffb9d8;
            font-size: 22px;
            animation: floatMove 8s ease-in-out infinite;
        }

        @keyframes floatMove {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.45; }
            50% { transform: translateY(-25px) rotate(15deg); opacity: 0.9; }
            100% { transform: translateY(0) rotate(0deg); opacity: 0.45; }
        }

        .footer {
            text-align: center;
            padding: 50px 0;
            font-size: 16px;
            color: #d487af;
        }

        .pic-btn{
            display: block;
            margin: 15px auto;
            padding: 10px 26px;
            border: none;
            border-radius: 30px;
            background: #ff97c1;
            color: #fff;
            font-size: 17px;
            cursor: pointer;
            transition: 0.3s;
        }
        .pic-btn:hover{
            background: #ff6ea9;
        }

        .back-btn{
            position:fixed;
            top:15px;
            left:15px;
            padding:6px 18px;
            background:#ff97c1;
            color:#fff;
            border:none;
            border-radius:20px;
            font-size:16px;
            z-index:999;
            cursor: pointer;
        }

        /* 生日动画全局 */
        .ani-body{
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        /* 下落祝福文字 */
        .fall-text{
            position: absolute;
            top: -50px;
            color: #fff;
            font-weight: bold;
            white-space: nowrap;
            animation: fallDown linear forwards;
        }
        @keyframes fallDown{
            0%{top:-50px;opacity:0;}
            10%{opacity:1;}
            90%{opacity:1;}
            100%{top:100vh;opacity:0;}
        }

        /* 烟花炸裂 */
        .firework{position:absolute;border-radius:50%;animation:fireBurst 2s ease-out forwards;}
        @keyframes fireBurst{0%{scale:0;opacity:1;}100%{scale:4;opacity:0;}}

        /* 蛋糕摆件 */
        .cake-obj{position:absolute;font-size:60px;animation:cakeAni 8s ease-in-out forwards;}
        @keyframes cakeAni{0%{scale:0;rotate:0deg;}50%{scale:1.1;}100%{scale:1;rotate:10deg;}}

        /* 蜡烛摇晃 */
        .candle{position:absolute;font-size:40px;animation:candleShake 3s ease-in-out infinite alternate;}
        @keyframes candleShake{0%{rotate:-8deg;}100%{rotate:8deg;}}

        /* 爱心跳动 */
        .heart-obj{position:absolute;font-size:30px;animation:heartBeat 2.5s ease-in-out infinite;}
        @keyframes heartBeat{0%{scale:1;}50%{scale:1.3;}100%{scale:1;}}

        /* 彩带飘动 */
        .ribbon{position:absolute;font-size:35px;animation:ribbonFloat 6s ease-in-out infinite;}
        @keyframes ribbonFloat{0%{translate:0 0;rotate:0deg;}50%{translate:15px 20px;rotate:180deg;}100%{translate:0 0;rotate:360deg;}}

        /* 星光闪烁 */
        .star-obj{position:absolute;font-size:25px;animation:starTwinkle 1.8s ease-in-out infinite alternate;}
        @keyframes starTwinkle{0%{opacity:0.3;scale:0.8;}100%{opacity:1;scale:1.2;}}

        /* 背景渐变流光 */
        .bg-flow{position:fixed;inset:0;background:linear-gradient(60deg,#ff0077,#ffcc22,#9922ff,#00ddff,#22ff88);background-size:600% 600%;animation:bgMove 25s linear infinite;opacity:0.15;}
        @keyframes bgMove{0%{background-position:0% 50%;}100%{background-position:100% 50%;}}

        /* 白色强力频闪 */
        .flash-light{position:fixed;inset:0;background:#fff;opacity:0;animation:flashStrong 12s infinite;}
        @keyframes flashStrong{0%,92%,100%{opacity:0;}94%,96%{opacity:0.4;}}

        /* 最终超大文字 */
        .final-big-text{
            position: fixed;
            top: 50%;
            left: 50%;
            translate: -50% -50%;
            font-size: 72px;
            font-weight: 900;
            color: #ff2e7e;
            text-shadow: 0 0 30px #fff,0 0 60px #ff0080;
            text-align: center;
            white-space: pre-line;
            scale: 0;
            z-index: 9999;
            animation: textShow 5s ease-out forwards;
        }
        @keyframes textShow{0%{scale:0;}40%{scale:1.3;}100%{scale:1;}}

        /* 告白页面样式 */
        .love-page{
            width:100vw;height:100vh;
            background:#f8d8e3;
            display:flex;flex-direction:column;
            justify-content:center;align-items:center;
            gap:60px;position:fixed;
            top:0;left:0;z-index:9999;
            display:none;
        }
        .love-img{width:220px;}
        .love-title{font-size:36px;color:#554455;}
        .love-btn{display:flex;gap:40px;}
        .btn-yes{
            padding:18px 45px;border:none;border-radius:12px;
            background:#e8889a;color:#fff;font-size:24px;
            transition:all 0.3s;cursor:pointer;
        }
        .btn-no{
            padding:18px 45px;border:none;border-radius:12px;
            background:#7396d8;color:#fff;font-size:24px;
            position:absolute;cursor:pointer;
        }
    </style>
</head>
<body>
    <div class="float-item" style="top:12%;left:6%;animation-delay:0s;">❤</div>
    <div class="float-item" style="top:35%;right:8%;animation-delay:1.2s;">✨</div>
    <div class="float-item" style="top:65%;left:4%;animation-delay:2.3s;">❤</div>
    <div class="float-item" style="top:85%;right:12%;animation-delay:3.1s;">✨</div>

    <div class="top-title">
        <span class="heart">❤</span> 我爱你 龙龙 <span class="heart">❤</span>
    </div>

    <div class="card">
        <h2>🎂 龙龙 生日倒计时</h2>
        <div class="count-time" id="countDown">加载中...</div>
        <p style="text-align:center;margin-top:18px;color:#c8729b;font-size:17px;">
            生日日期：11月13日 💝
        </p>
        <button class="pic-btn" onclick="checkBirthdayLock()">生日快乐祝福</button>
    </div>

    <div class="card">
        <h2>✨ 心动偶像｜陈哲远 ✨</h2>
        <div class="star-text">
            少年温柔 自带星光<br>
            满目星河 不及陈哲远<br>
            永远热爱 满心欢喜<br>
            岁岁平安 万事顺意 🌟
        </div>
        <button class="pic-btn" onclick="toPhotoPage()">查看全部照片</button>
    </div>

    <div class="card">
        <h2>💖 龙龙的少女心小窝</h2>
        <p style="text-align:center;line-height:2.2;font-size:17px;color:#c76896;">
            专属小窝<br>
            可可爱爱 甜甜每一天
        </p>
        <button class="pic-btn" onclick="openLovePage()">郑重表白💌</button>
    </div>

    <div class="footer">
        💗 少女心专属网页 · 温柔治愈小站 💗
    </div>

    <!-- 同款表情包告白页面 -->
    <div class="love-page" id="loveBox">
        <img src="https://p3-flow-image-sign.byteimg.com/tos-cn-i-a9rneduch4/320c2008408a4008992d0200422d4511~tplv-a9rneduch4-image.image" class="love-img">
        <div class="love-title">可以成为我的恋人吗？</div>
        <div class="love-btn">
            <button class="btn-yes" id="yesBtn">可以</button>
            <button class="btn-no" id="noBtn">不要</button>
        </div>
    </div>

    <script>
        const targetMonth = 11;
        const targetDay = 13;

        function updateCountDown() {
            const now = new Date();
            let birth = new Date(now.getFullYear() + "-" + targetMonth + "-" + targetDay);
            if (now > birth) {
                birth = new Date(now.getFullYear() + 1 + "-" + targetMonth + "-" + targetDay);
            }
            let diff = birth - now;
            let d = Math.floor(diff / 86400000);
            let h = Math.floor(diff % 86400000 / 3600000);
            let m = Math.floor(diff % 3600000 / 60000);
            let s = Math.floor(diff % 60000 / 1000);
            document.getElementById("countDown").innerText = `${d}天 ${h}时 ${m}分 ${s}秒`;
        }
        updateCountDown();
        setInterval(updateCountDown, 1000);

        function checkBirthdayLock(){
            const now = new Date();
            const currentMonth = now.getMonth() + 1;
            const currentDay = now.getDate();

            if(currentMonth < targetMonth || (currentMonth === targetMonth && currentDay < targetDay)){
                let nextBirth = new Date(now.getFullYear(), targetMonth - 1, targetDay);
                if(now > nextBirth){
                    nextBirth = new Date(now.getFullYear() + 1, targetMonth - 1, targetDay);
                }
               let days = Math.ceil((nextBirth - now)let / (1000 * 60 * 60 * 24));
                alert(`🎂 还没到龙龙宝宝生日哦\n距离生日还有：${days} 天\n敬请期待～`);
                return;
            }
            location.href = "?birthday=full";
        }

        function toPhotoPage(){
            let ran = Math.floor(Math.random() * 9) + 1;
            location.href = "?img=" + ran;
        }

        function randColor(){
            let arr = ["#ff0077","#ffdd00","#aa33ff","#00eeff","#33ff99","#ff5533","#ffffff"];
            return arr[Math.floor(Math.random()*arr.length)];
        }

        const wishList = [
            "生日快乐✨","岁岁平安","事事顺心","天天开心","永远可爱",
            "平安喜乐","好运满满","甜蜜加倍","无忧无虑","万事胜意",
            "被爱包围","闪闪发光","福气满满","快乐万岁","永远幸福"
        ];

        function createFallText(){
            let box = document.querySelector(".ani-body");
            let text = document.createElement("div");
            text.className = "fall-text";
            text.innerText = wishList[Math.floor(Math.random()*wishList.length)];
            text.style.left = Math.random()*100 + "vw";
            text.style.color = randColor();
            text.style.fontSize = (Math.random()*12 + 16) + "px";
            text.style.animationDuration = (Math.random()*6 + 8) + "s";
            box.appendChild(text);
            setTimeout(()=>text.remove(),14000);
        }

        function createFire(){
            let box = document.querySelector(".ani-body");
            let dom = document.createElement("div");
            dom.className = "firework";
            dom.style.left = Math.random()*100+"vw";
            dom.style.top = Math.random()*100+"vh";
            dom.style.width = dom.style.height = Math.random()*30+15+"px";
            dom.style.background = randColor();
            box.appendChild(dom);
            setTimeout(()=>dom.remove(),2000);
        }

        function addDecoration(){
            let box = document.querySelector(".ani-body");
            let cake = document.createElement("div");
            cake.className = "cake-obj";
            cake.innerText = "🎂";
            cake.style.left = "50%";cake.style.top = "55%";cake.style.translate = "-50%";
            box.appendChild(cake);
            for(let i=0;i<3;i++){
                let candle = document.createElement("div");
                candle.className = "candle";
                candle.innerText = "🕯️";
                candle.style.left = (35+i*15)+"%";
                candle.style.top = "48%";
                box.appendChild(candle);
            }
            for(let i=0;i<6;i++){
                let h = document.createElement("div");
                h.className = "heart-obj";
                h.innerText = "💖";
                h.style.left = Math.random()*90+"%";
                h.style.top = Math.random()*80+"%";
                box.appendChild(h);
            }
            for(let i=0;i<4;i++){
                let r = document.createElement("div");
                r.className = "ribbon";
                r.innerText = "🎀";
                r.style.left = Math.random()*90+"%";
                r.style.top = Math.random()*80+"%";
                box.appendChild(r);
            }
            for(let i=0;i<8;i++){
                let s = document.createElement("div");
                s.className = "star-obj";
                s.innerText = "⭐";
                s.style.left = Math.random()*90+"%";
                s.style.top = Math.random()*80+"%";
                box.appendChild(s);
            }
        }

        // 表白页面打开
        function openLovePage(){
            document.getElementById("loveBox").style.display = "flex";
        }

        // 不要按钮乱跑
        const noBtn = document.getElementById("noBtn");
        noBtn.onclick = function(){
            const maxX = window.innerWidth - noBtn.offset - 30;
            const maxY = window.innerHeight - noBtn.offsetHeight - 30;
            noBtn.style.left = Math.random()*maxX + 'px';
            noBtn.style.top = Math.random()*maxY + 'px';
        }

        // 可以按钮放大
        let scale = 1;
        const yesBtn = document.getElementById("yesBtn");
        yesBtn.onclick = function(){
            scale += 0.25;
            if(scale < 3){
                yesBtn.style.transform = "scale("+scale+")";
            }else{
                alert("爱你呦宝宝❤️\n收到请回复1314");
                document.getElementById("loveBox").style.display = "none";
                scale = 1;
                yesBtn.style.transform = "scale(1)";
            }
        }

        (function(){
            let url = location.href;
            if(url.includes("?img=")){
                let num = url.split("img=")[1];
                document.body.innerHTML = `
                <style>
                    *{margin:0;padding:0;}
                    body{background:#000;height:100vh;display:flex;justify-content:center;align-items:center;}
                    .back-btn{position:fixed;top:15px;left:15px;padding:6px 18px;background:#ff97c1;color:#fff;border:none;border-radius:20px;font-size:16px;z-index:999;}
                    img{width:100%;height:100%;object-fit:contain;}
                </style>
                <button class="back-btn" onclick="history.back()">返回</button>
                <img src="${num}.jpg" alt="陈哲远">
                `;
            }

            if(url.includes("?birthday=full")){
                document.body.innerHTML = `
                <div class="ani-body">
                    <button class="back-btn" onclick="history.back()">返回</button>
                    <div class="bg-flow"></div>
                    <div class="flash-light"></div>
                    <audio id="bgMp3" loop preload="auto">
                        <source src="happy.mp3" type="audio/mpeg">
                    
                    <div class="final-big-text" id="finalTxt"></div>
                </div>
                `;

                let mp3 = document.getElementById("bgMp3");
                mp3.volume = 0.7;
                mp3.play();

                setTimeout(addDecoration, 100);

                let fall1 = setInterval(createFallText, 600);
                setTimeout(()=>clearInterval(fall1),15000);

                let fire1 = setInterval(createFire, 900);
                setTimeout(()=>clearInterval(fire1),30000);

                let fall2 = setInterval(createFallText, 1400);
                setTimeout(()=>clearInterval(fall2),45000);

                let fire2 = setInterval(createFire, 500);
                setTimeout(()=>clearInterval(fire2),60000);

                let fall3 = setInterval(createFallText, 2000);
                setTimeout(()=>clearInterval(fall3),75000);

                let fall4 = setInterval(createFallText, 700);
                let fire3 = setInterval(createFire, 600);
                setTimeout(()=>{
                    clearInterval(fall4);
                    clearInterval(fire3);
                },95000);

                setTimeout(()=>{
                    document.getElementById("finalTxt").innerText = "龙龙宝宝\n生日快乐";
                },90000);
            }
        })();
    </script>
</body>
</html>
