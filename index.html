<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1龙龙 & 陈哲远 专属小窝💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffeaf6, #fde2f3, #f8e4ff);
            min-height: 100vh;
            font-family: "幼圆", "Comic Sans MS", "微软雅黑", sans-serif;
            overflow-x: hidden;
        }

        .top-title {
            text-align: center;
            padding: 35px 10px;
            font-size: 46px;
            font-weight: bold;
            color: #ff5ea8;
            text-shadow: 0 0 10px #ffc8e0;
            animation: swing 2.5s ease-in-out infinite alternate;
        }

        @keyframes swing {
            0% { transform: rotate(-2deg) scale(1); }
            100% { transform: rotate(2deg) scale(1.03); }
        }

        .heart {
            color: #ff2e7e;
            animation: beat 1.2s infinite alternate;
        }

        @keyframes beat {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        .card {
            width: 92%;
            max-width: 620px;
            margin: 30px auto;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 35px;
            padding: 28px;
            box-shadow: 0 6px 18px #ffd2e6;
            border: 3px solid #ffd6ec;
            animation: cardUp 5s ease-in-out infinite;
        }

        @keyframes cardUp {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .card h2 {
            text-align: center;
            margin-bottom: 18px;
            color: #d85b93;
            font-size: 26px;
            letter-spacing: 2px;
        }

        .count-time {
            font-size: 32px;
            text-align: center;
            font-weight: bold;
            color: #b7487a;
            letter-spacing: 4px;
        }

        .star-text {
            line-height: 2.2;
            font-size: 18px;
            text-align: center;
            color: #c76896;
        }

        .float-item {
            position: fixed;
            z-index: -1;
            color: #ffb9d8;
            font-size: 22px;
            animation: floatMove 8s ease-in-out infinite;
        }

        @keyframes floatMove {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.45; }
            50% { transform: translateY(-25px) rotate(15deg); opacity: 0.9; }
            100% { transform: translateY(0) rotate(0deg); opacity: 0.45; }
        }

        .footer {
            text-align: center;
            padding: 50px 0;
            font-size: 16px;
            color: #d487af;
        }

        .pic-btn{
            display: block;
            margin: 15px auto;
            padding: 10px 26px;
            border: none;
            border-radius: 30px;
            background: #ff97c1;
            color: #fff;
            font-size: 17px;
            cursor: pointer;
            transition: 0.3s;
        }
        .pic-btn:hover{
            background: #ff6ea9;
        }

        .gallery-body{
            background: #fef0f7;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .back-btn{
            position: fixed;
            top:20px;
            left:20px;
            padding:8px 20px;
            background:#ff97c1;
            color:#fff;
            border:none;
            border-radius:25px;
            font-size:16px;
            z-index:999;
            cursor: pointer;
        }
        .img-box{
            width: 90%;
            max-width: 400px;
        }
        .img-box img{
            width:100%;
            border-radius:20px;
            box-shadow: 0 0 15px #ffd2e6;
        }
        .turn-btn{
            margin-top:25px;
            display: flex;
            gap: 30px;
        }
        .turn-btn button{
            padding:8px 24px;
            border:none;
            border-radius:25px;
            background:#ff97c1;
            color:#fff;
            font-size:16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="float-item" style="top:12%;left:6%;animation-delay:0s;">❤</div>
    <div class="float-item" style="top:35%;right:8%;animation-delay:1.2s;">✨</div>
    <div class="float-item" style="top:65%;left:4%;animation-delay:2.3s;">❤</div>
    <div class="float-item" style="top:85%;right:12%;animation-delay:3.1s;">✨</div>

    <div class="top-title">
        <span class="heart">❤</span> 我爱你 龙龙 <span class="heart">❤</span>
    </div>

    <div class="card">
        <h2>🎂 田蛟龙 生日倒计时</h2>
        <div class="count-time" id="countDown">加载中...</div>
        <p style="text-align:center;margin-top:18px;color:#c8729b;font-size:17px;">
            生日日期：11月13日 💝
        </p >
    </div>

    <div class="card">
        <h2>✨ 心动偶像｜陈哲远 ✨</h2>
        <div class="star-text">
            少年温柔 自带星光<br>
            满目星河 不及陈哲远<br>
            永远热爱 满心欢喜<br>
            岁岁平安 万事顺意 🌟
        </div>
        <button class="pic-btn" onclick="openGallery()">查看照片画廊</button>
    </div>

    <div class="card">
        <h2>💖 龙龙的少女心小窝</h2>
        <p style="text-align:center;line-height:2.2;font-size:17px;color:#c76896;">
            属于田蛟龙的专属页面<br>
            可可爱爱 甜甜每一天
        </p >
    </div>

    <div class="footer">
        💗 少女心专属网页 · 温柔治愈小站 💗
    </div>

    <script>
        function updateCountDown() {
            const now = new Date();
            let birth = new Date(now.getFullYear() + "-11-13 00:00:00");
            if (now > birth) birth = new Date(now.getFullYear() + 1 + "-11-13 00:00:00");
            let diff = birth - now;
            let d = Math.floor(diff / 86400000);
            let h = Math.floor(diff % 86400000 / 3600000);
            let m = Math.floor(diff % 3600000 / 60000);
            let s = Math.floor(diff % 60000 / 1000);
            document.getElementById("countDown").innerText = `${d}天 ${h}时 ${m}分 ${s}秒`;
        }
        updateCountDown();
        setInterval(updateCountDown, 1000);

        function openGallery(){
            window.location.href = "?gallery=yes";
        }

        let nowImg = 1;
        const maxImg = 9;

        (function(){
            if(location.search.indexOf("gallery=yes") !== -1){
                document.body.innerHTML = `
                <div class="gallery-body">
                    <button class="back-btn" onclick="history.back()">返回</button>
                    <div class="img-box">
                        < img id="showImg" src="1.jpg">
                    </div>
                    <div class="turn-btn">
                        <button onclick="prevImg()">上一张</button>
                        <button onclick="nextImg()">下一张</button>
                    </div>
                </div>
                `;
            }
        })();

        function prevImg(){
            nowImg--;
            if(nowImg < 1){
                nowImg = 9;
            }
            // 完整标准写法：数字.png
            document.getElementById("showImg").src = nowImg + ".jpg";
        }

        function nextImg(){
            nowImg++;
            if(nowImg > 9){
                nowImg = 1;
            }
            // 完整标准写法：数字.png
            document.getElementById("showImg").src = nowImg + ".jpg";
        }
    </script>
</body>
</html>
