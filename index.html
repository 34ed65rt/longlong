<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙龙 & 陈哲远 专属小窝💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffeaf6, #fde2f3, #f8e4ff);
            min-height: 100vh;
            font-family: "幼圆", "Comic Sans MS", "微软雅黑", sans-serif;
            overflow-x: hidden;
        }

        .top-title {
            text-align: center;
            padding: 35px 10px;
            font-size: 46px;
            font-weight: bold;
            color: #ff5ea8;
            text-shadow: 0 0 10px #ffc8e0;
            animation: swing 2.5s ease-in-out infinite alternate;
        }

        @keyframes swing {
            0% { transform: rotate(-2deg) scale(1); }
            100% { transform: rotate(2deg) scale(1.03); }
        }

        .heart-icon {
            color: #ff2e7e;
            animation: beat 1.2s infinite alternate;
        }

        @keyframes beat {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        .card {
            width: 92%;
            max-width: 620px;
            margin: 30px auto;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 35px;
            padding: 30px;
            box-shadow: 0 6px 20px #ffd6ec;
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0%,100%{transform: translateY(0);}
            50%{transform: translateY(-8px);}
        }

        .card h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #d85b93;
            font-size: 28px;
            letter-spacing: 2px;
        }

        .count-time {
            font-size: 34px;
            text-align: center;
            font-weight: bold;
            color: #b74787;
            letter-spacing: 4px;
            margin: 15px 0;
        }

        .star-text {
            line-height: 2.2;
            font-size: 18px;
            text-align: center;
            color: #c76896;
            margin: 10px 0;
        }

        .float-item {
            position: fixed;
            z-index: -1;
            color: #ffb9d8;
            font-size: 22px;
            animation: move 8s linear infinite;
        }

        @keyframes move {
            0%{transform: translateY(100vh) rotate(0deg);opacity:0;}
            10%{opacity:1;}
            90%{opacity:1;}
            100%{transform: translateY(-10vh) rotate(360deg);opacity:0;}
        }

        .btn-pink {
            display: block;
            margin: 18px auto;
            padding: 12px 28px;
            border: none;
            border-radius: 30px;
            background: #ff97c1;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-pink:hover {
            background: #ff6ea9;
            transform: scale(1.05);
        }

        .btn-back {
            position: fixed;
            top: 15px;
            left: 15px;
            padding: 8px 18px;
            background: #ff97c1;
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            z-index: 999;
            cursor: pointer;
        }

        /* 生日动画页面 */
        .ani-box {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        .fall-text {
            position: absolute;
            top: -50px;
            color: #fff;
            font-weight: bold;
            white-space: nowrap;
            animation: fall linear forwards;
        }

        .fire-work {
            position: width: 100%;
            height: 100%;
            border: none;
            border-radius: 50%;
            animation: boom 2s ease-out forwards;
        }

        @keyframes fall {
            0%{top:-50px;opacity:0;}
            10%{opacity:1;}
            90%{opacity:1;}
            100%{top:100vh;opacity:0;}
        }

        @keyframes boom {
            0%{transform:scale(0);opacity:1;}
            100%{transform:scale(4);opacity:0;}
        }

        .cake-obj {
            position: absolute;
            font-size: 60px;
            animation: cakeFloat 8s ease-in-out infinite;
        }

        @keyframes cakeFloat {
            0%,100%{transform: translateY(0);}
            50%{transform: translateY(-15px);}
        }

        .bg-flow {
            position: fixed;
            inset: 0;
            background: linear-gradient(60deg,#ff0077,#ffcc22,#9922ff,#00ddeeff,#22ff88);
            background-size: 600% 600%;
            animation: bgMove 25s linear infinite;
            opacity: 0.15;
            z-index: -2;
        }

        .flash-light {
            position: fixed;
            inset: 0;
            background: #fff;
            opacity: 0;
            animation: flash 12s infinite;
        }

        @keyframes bgMove {
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        @keyframes flash {
            0%,92%,100%{opacity:0;}
            94%,96%{opacity:0.4;}
        }

        .big-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%) scale(0);
            font-size: 72px;
            font-weight: 900;
            color: #ff2e7e;
            text-shadow: 0 0 60px #fff;
            z-index: 9999;
            animation: showText 5s ease forwards;
        }

        @keyframes showText {
            40%{transform: translate(-50%,-50%) scale(1.3);}
            100%{transform: translate(-50%,-50%) scale(1);}
        }

        /* 表白专属页面 */
        .love-wrap {
            width: 100vw;
            height: 100vh;
            background: #f8d8e3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 60px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 99999;
            display: none;
        }

        .love-img {
            width: 240px;
            border-radius: 20px;
        }

        .love-title {
            font-size: 38px;
            color: #554455;
            font-weight: bold;
        }

        .love-btn-group {
            display: flex;
            gap: 50px;
        }

        .btn-agree {
            padding: 20px 50px;
            border: none;
            border-radius: 12px;
            background: #e8889a;
            color: #fff;
            font-size: 26px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-refuse {
            padding: 20px 50px;
            border: none;
            border-radius: 12px;
            background: #7396d8;
            color: #fff;
            font-size: 26px;
            position: absolute;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            padding: 40px 0;
            font-size: 16px;
            color: #d487af;
        }
    </style>
</head>
<body>
    <div class="bg-flow"></div>
    <div class="flash-light"></div>

    <div class="top-title">
        <span class="heart-icon">❤</span> 我爱你 龙龙 <span class="heart-icon">❤</span>
    </div>

    <div class="card">
        <h2>🎂 龙龙生日倒计时</h2>
        <div class="count-time" id="countDown">加载中...</div>
        <p style="text-align:center;color:#c8729b">生日日期：11月13日</p>
        <button class="btn-pink" onclick="openBirthdayAnim()">开启生日浪漫祝福✨</button>
    </div>

    <div class="card">
        <h2>✨ 专属心动回忆</h2>
        <p class="star-text">
            少年温柔，岁岁欢喜<br>
            满心欢喜，皆是你<br>
            永远偏爱，永远心动
        </p>
        <button class="btn-pink" onclick="openPhotoPage()">查看专属照片💌</button>
    </div>

    <div class="card">
        <h2>💖 只属于我们</h2>
        <p class="star-text">
            专属小窝<br>
            可可爱爱，甜甜每一天
        </p>
        <button class="btn-pink" onclick="openLovePage()">郑重告白 · 在一起</button>
    </div>

    <div class="footer">
        专属爱意 · 永久珍藏
    </div>

    <!-- 表白弹窗 -->
    <div class="love-wrap" id="loveBox">
        <img src="https://p3-flow-image-sign.byteimg.com/tos-cn-i-a9rneduch4/320c2008408a4008992d0200422d4511~tplv-a9rneduch4-image.image" class="love-img">
        <div class="love-title">可以成为我的恋人吗？</div>
        <div class="love-btn-group">
            <button class="btn-agree" id="yesBtn">可以</button>
            <button class="btn-refuse" id="noBtn">不要</button>
        </div>
    </div>

    <script>
        // 生日倒计时 11.13
        const targetMonth = 11;
        const targetDay = 13;

        function updateCountDown() {
            const now = new Date();
            let birthday = new Date(now.getFullYear(), targetMonth - 1, targetDay);
            if (now > birthday) birthday = new Date(now.getFullYear() + 1, targetMonth - 1, targetDay);

            const diff = birthday - now;
            const day = Math.floor(diff / 86400000);
            const hour = Math.floor((diff % 86400000) / 3600000);
            const min = Math.floor((diff % 3600000) / 60000);
            const sec = Math.floor((diff % 60000) / 1000);

            document.getElementById("countDown").innerText = `${day}天 ${hour}时 ${min}分 ${sec}秒`;
        }
        updateCountDown();
        setInterval(updateCountDown, 1000);

        // 生日动画
        function openBirthdayAnim() {
            const now = new Date();
            const m = now.getMonth() + 1;
            const d = now.getDate();
            if (m !== targetMonth || d !== targetDay) {
                const next = new Date(now.getFullYear(), targetMonth-1, targetDay);
                if(now>next)next.setFullYear(now.getFullYear()+1);
                const day = Math.ceil((next-now)/86400000);
                alert(`还没到生日哦，还差${day}天~`);
                return;
            }
            document.body.innerHTML = `
                <div class="ani-box">
                    <button class="btn-back" onclick="history.reload()">返回</button>
                    <div class="big-text">龙龙生日快乐❤️</div>
                </div>
            `;
        }

        // 照片页
        function openPhotoPage() {
            const num = Math.floor(Math.random()*9)+1;
            location.href = "?img="+num;
        }

        // 表白页面打开
        function openLovePage() {
            document.getElementById("loveBox").style.display = "flex";
        }

        // 拒绝按钮逃跑
        document.getElementById("noBtn").onmouseover = function() {
            const maxX = window.innerWidth - this.offsetWidth - 30;
            const maxY = window.innerHeight - this.offsetHeight - 30;
            this.style.left = Math.random() * maxX + "px";
            this.style.top = Math.random() * maxY + "px";
        }

        // 同意按钮爱心放大
        let scale = 1;
        document.getElementById("yesBtn").onclick = function() {
            scale += 0.3;
            if(scale < 3) {
                this.style.transform = "scale("+scale+")";
            } else {
                alert("永远在一起❤️ 1314一辈子");
                document.getElementById("loveBox").style.display = "none";
                scale = 1;
                this.style.transform = "scale(1)";
            }
        }

        // 页面路由
        (function(){
            const url = location.search;
            if(url.includes("?img=")){
                const n = url.split("=")[1];
                document.body.innerHTML = `
                <style>body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}</style>
                <button class="btn-back" onclick="history.back()">返回</button>
                <img src="${n}.jpg" style="max-width:90%;max-height:90vh;border-radius:20px;">
                `;
            }
        })();
    </script>
</body>
</html>
